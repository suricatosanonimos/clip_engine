  <text x="554" y="130" text-anchor="middle" fill="#6b7280" font-size="8">timeout 10min</text>
  <text x="554" y="143" text-anchor="middle" fill="#6b7280" font-size="8">Supabase Storage</text>

  <polygon points="624,97 639,90 639,104" fill="#3fb950"/>
