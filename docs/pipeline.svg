<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <rect width="900" height="200" fill="#0d1117" rx="12"/>
  <rect width="900" height="200" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <text x="450" y="28" text-anchor="middle" fill="#FF6B00" font-size="12" font-weight="bold" letter-spacing="3">PIPELINE DE PROCESSAMENTO</text>

  <!-- Step 1 -->
  <rect x="30" y="55" width="130" height="95" rx="8" fill="#161b22" stroke="#FF6B00" stroke-width="1.5"/>
