      <stop offset="25%" style="stop-color:#58a6ff"/>
      <stop offset="50%" style="stop-color:#d29922"/>
      <stop offset="75%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
