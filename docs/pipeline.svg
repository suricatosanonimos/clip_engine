  <text x="95" y="130" text-anchor="middle" fill="#6b7280" font-size="8">retry 3x</text>
  <text x="95" y="143" text-anchor="middle" fill="#6b7280" font-size="8">ou upload</text>

  <polygon points="165,97 180,90 180,104" fill="#FF6B00"/>
