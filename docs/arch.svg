<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B00"/>
      <stop offset="100%" style="stop-color:#FF8C42"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="url(#bg)" rx="12"/>
  <rect width="900" height="420" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#FF6B00" font-size="15" font-weight="bold" letter-spacing="4">CLIP ENGINE — ARQUITETURA</text>
  <line x1="60" y1="52" x2="840" y2="52" stroke="#30363d" stroke-width="1"/>

  <!-- ── MOBILE APP ── -->
  <rect x="40" y="75" width="160" height="280" rx="10" fill="#161b22" stroke="#FF6B00" stroke-width="1.5"/>
  <rect x="40" y="75" width="160" height="32" rx="10" fill="#FF6B00" opacity="0.15"/>
  <rect x="40" y="95" width="160" height="12" rx="0" fill="#FF6B00" opacity="0.15"/>
  <text x="120" y="96" text-anchor="middle" fill="#FF6B00" font-size="11" font-weight="bold">📱 APP FLET</text>
  <text x="120" y="114" text-anchor="middle" fill="#8b949e" font-size="9">Android / Desktop</text>

  <rect x="55" y="122" width="130" height="22" rx="5" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="120" y="137" text-anchor="middle" fill="#e2e8f0" font-size="9">🔐 Tela de Login</text>

  <rect x="55" y="150" width="130" height="22" rx="5" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="120" y="165" text-anchor="middle" fill="#e2e8f0" font-size="9">🎬 Novo Projeto</text>

  <rect x="55" y="178" width="130" height="22" rx="5" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="120" y="193" text-anchor="middle" fill="#e2e8f0" font-size="9">⚙️ Processamento</text>

  <rect x="55" y="206" width="130" height="22" rx="5" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="120" y="221" text-anchor="middle" fill="#e2e8f0" font-size="9">🖼️ Galeria</text>

  <rect x="55" y="240" width="130" height="30" rx="5" fill="#FF6B00" opacity="0.1" stroke="#FF6B00" stroke-width="1"/>
  <text x="120" y="252" text-anchor="middle" fill="#FF8C42" font-size="8">httpx + ngrok</text>
  <text x="120" y="264" text-anchor="middle" fill="#FF8C42" font-size="8">ngrok-skip-browser-warning</text>

  <!-- ── ARROW APP -> NGROK ── -->
  <line x1="202" y1="215" x2="270" y2="215" stroke="#FF6B00" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="270,210 282,215 270,220" fill="#FF6B00"/>

  <!-- ── NGROK ── -->
  <rect x="284" y="175" width="120" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="344" y="198" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="bold">🌐 NGROK</text>
  <text x="344" y="215" text-anchor="middle" fill="#6b7280" font-size="8">perceptible-westin</text>
  <text x="344" y="228" text-anchor="middle" fill="#6b7280" font-size="8">-checkable.ngrok</text>
  <text x="344" y="241" text-anchor="middle" fill="#6b7280" font-size="8">-free.dev</text>

  <!-- ── ARROW NGROK -> API ── -->
  <line x1="406" y1="215" x2="474" y2="215" stroke="#FF6B00" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="474,210 486,215 474,220" fill="#FF6B00"/>

  <!-- ── FASTAPI ── -->
  <rect x="488" y="75" width="200" height="280" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <rect x="488" y="75" width="200" height="12" rx="10" fill="#58a6ff" opacity="0.1"/>
  <text x="588" y="96" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">⚡ FASTAPI</text>
  <text x="588" y="114" text-anchor="middle" fill="#8b949e" font-size="9">:8000 — uvicorn</text>

  <rect x="503" y="122" width="170" height="18" rx="4" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="588" y="135" text-anchor="middle" fill="#58a6ff" font-size="8">POST /api/auth/login • register</text>

  <rect x="503" y="145" width="170" height="18" rx="4" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="588" y="158" text-anchor="middle" fill="#58a6ff" font-size="8">POST /api/jobs</text>

  <rect x="503" y="168" width="170" height="18" rx="4" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="588" y="181" text-anchor="middle" fill="#58a6ff" font-size="8">POST /api/video/process • upload</text>

  <rect x="503" y="191" width="170" height="18" rx="4" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="588" y="204" text-anchor="middle" fill="#58a6ff" font-size="8">GET  /api/status/{id}/stream SSE</text>

  <rect x="503" y="214" width="170" height="18" rx="4" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="588" y="227" text-anchor="middle" fill="#58a6ff" font-size="8">GET  /api/clips • /api/jobs</text>

  <!-- Pipeline box -->
  <rect x="503" y="244" width="170" height="55" rx="5" fill="#0d2137" stroke="#58a6ff" stroke-width="1" opacity="0.8"/>
  <text x="588" y="259" text-anchor="middle" fill="#58a6ff" font-size="8" font-weight="bold">PIPELINE</text>
  <text x="588" y="272" text-anchor="middle" fill="#6b7280" font-size="7.5">yt-dlp → VideoProcessor</text>
  <text x="588" y="283" text-anchor="middle" fill="#6b7280" font-size="7.5">MediaPipe → Whisper</text>
  <text x="588" y="294" text-anchor="middle" fill="#6b7280" font-size="7.5">FFmpeg CRF23 → Storage</text>

  <!-- ── ARROW API -> SUPABASE ── -->
  <line x1="690" y1="185" x2="748" y2="185" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="748,180 760,185 748,190" fill="#3fb950"/>
  <line x1="690" y1="265" x2="748" y2="265" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="748,260 760,265 748,270" fill="#3fb950"/>

  <!-- ── SUPABASE ── -->
  <rect x="762" y="75" width="110" height="280" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="817" y="96" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">🗄️ SUPABASE</text>

  <rect x="775" y="110" width="88" height="48" rx="5" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="819" y="124" text-anchor="middle" fill="#3fb950" font-size="8" font-weight="bold">Auth</text>
  <text x="819" y="136" text-anchor="middle" fill="#6b7280" font-size="7">JWT tokens</text>
  <text x="819" y="148" text-anchor="middle" fill="#6b7280" font-size="7">users table</text>

  <rect x="775" y="165" width="88" height="48" rx="5" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="819" y="179" text-anchor="middle" fill="#3fb950" font-size="8" font-weight="bold">Database</text>
  <text x="819" y="191" text-anchor="middle" fill="#6b7280" font-size="7">public.jobs</text>
  <text x="819" y="203" text-anchor="middle" fill="#6b7280" font-size="7">public.clips</text>

  <rect x="775" y="220" width="88" height="60" rx="5" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="819" y="234" text-anchor="middle" fill="#3fb950" font-size="8" font-weight="bold">Storage</text>
  <text x="819" y="246" text-anchor="middle" fill="#6b7280" font-size="7">bucket: clips</text>
  <text x="819" y="258" text-anchor="middle" fill="#6b7280" font-size="7">bucket: videos</text>
  <text x="819" y="270" text-anchor="middle" fill="#6b7280" font-size="7">signed URL 7d</text>

  <!-- SSE label -->
  <text x="344" y="310" text-anchor="middle" fill="#FF6B00" font-size="8" opacity="0.7">SSE stream</text>
  <line x1="202" y1="300" x2="486" y2="300" stroke="#FF6B00" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Footer -->
  <text x="450" y="395" text-anchor="middle" fill="#30363d" font-size="9">github.com/Gilderlan0101/clip_engine</text>
</svg>
