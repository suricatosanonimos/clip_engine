name: Build Flet APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Install Flet and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.82.2 httpx==0.28.1

      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory "*"

      - name: Build APK
        run: |
          cd app
          yes | flet build apk \
            --module-name main \
            --project "ClipEngine" \
            --product "Clip Engine" \
            --org "com.devorbit.clipengine" \
            --icon assets/icons/icon.png

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: clip-engine-apk
          path: app/build/apk/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master'
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Clip Engine APK #${{ github.run_number }}"
          files: app/build/apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
