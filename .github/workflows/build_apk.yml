name: Build Flet APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  # Força o uso do Node 24 para evitar os avisos de depreciação que você viu
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Adicionando a permissão de escrita que você solicitou
    permissions:
      contents: write
    
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f app/requirements.txt ]; then pip install -r app/requirements.txt; fi

      - name: Git Safe Directory
        run: git config --global --add safe.directory "*"

      - name: Build APK
        run: |
          # O 'yes' responde automaticamente 'y' para a instalação do Flutter SDK 3.41.4
          # Adicionei o argumento --no-interactive para garantir que o Flet não espere input
          yes | flet build apk app/ --project "ClipEngine" --product "ClipEngineApp"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: clip-engine-apk
          path: app/build/apk/*.apk
