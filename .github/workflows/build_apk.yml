name: Build Flet APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet
          # Instala os requisitos da raiz E da pasta app
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f app/requirements.txt ]; then pip install -r app/requirements.txt; fi

      - name: Git Safe Directory
        run: git config --global --add safe.directory "*"

      - name: Build APK
        run: |
          # Rodamos o build apontando para a pasta app/ onde está o main.py
          # O Flet vai empacotar o que estiver dentro da pasta do projeto
          flet build apk app/ --project "ClipEngine" --product "ClipEngineApp"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: clip-engine-apk
          path: build/apk/*.apk
